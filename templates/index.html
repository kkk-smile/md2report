<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程设计报告生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft YaHei","PingFang SC",sans-serif; background:#f0f2f5; color:#333; min-height:100vh; }

    header { background:#1a1a2e; color:#fff; padding:14px 24px; display:flex; align-items:center; gap:12px; }
    header h1 { font-size:18px; font-weight:600; }
    header span { font-size:12px; color:#aaa; }

    /* 三栏布局 */
    .layout { display:flex; height:calc(100vh - 52px); overflow:hidden; }

    /* 左侧设置面板 */
    .panel-left {
      width:360px; flex-shrink:0;
      overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px;
      background:#fff; border-right:1px solid #e5e7eb;
    }
    .card { background:#f8f9fa; border-radius:8px; padding:14px; }
    .card-title { font-size:12px; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }

    .form-group { margin-bottom:10px; }
    .form-group label { display:block; font-size:13px; color:#555; margin-bottom:4px; }
    .form-group input, .form-group select {
      width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px;
      font-size:13px; outline:none; background:#fff;

    .row3 { display:flex; gap:6px; }

    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

    .btn-add:hover { background:#f0f0ff; }

<script>
// ── 工具函数 ──────────────────────────────────────────────────────────
function getFmt() {
  return {
    school:        document.getElementById('fmt-school').value        || '莆田学院新工科产业学院',
    h1_font:       document.getElementById('fmt-h1-font').value,
    h1_size:       parseFloat(document.getElementById('fmt-h1-size').value)   || 16,
    h1_bold:       document.getElementById('fmt-h1-bold').checked,
    h2_font:       document.getElementById('fmt-h2-font').value,
    h2_size:       parseFloat(document.getElementById('fmt-h2-size').value)   || 16,
    h2_bold:       document.getElementById('fmt-h2-bold').checked,
    h3_font:       document.getElementById('fmt-h3-font').value,
    h3_size:       parseFloat(document.getElementById('fmt-h3-size').value)   || 14,
    h3_bold:       document.getElementById('fmt-h3-bold').checked,
    body_font:     document.getElementById('fmt-body-font').value,
    body_size:     parseFloat(document.getElementById('fmt-body-size').value) || 12,
    line_spacing:  parseFloat(document.getElementById('fmt-line-spacing').value) || 1.5,
    margin_top:    parseFloat(document.getElementById('fmt-margin-top').value)    || 2.54,
    margin_bottom: parseFloat(document.getElementById('fmt-margin-bottom').value) || 2.54,
    margin_left:   parseFloat(document.getElementById('fmt-margin-left').value)   || 3.17,
    margin_right:  parseFloat(document.getElementById('fmt-margin-right').value)  || 2.54,
  };
}

// cm → px（96dpi）
function cm2px(cm) { return cm * 37.795; }

// 中文字体名 → CSS font-family
function cnFont(name) {
  const map = { '黑体':'SimHei,"黑体",sans-serif', '宋体':'SimSun,"宋体",serif',
                '楷体':'KaiTi,"楷体",serif', '仿宋':'FangSong,"仿宋",serif' };
  return map[name] || name;
}

// ── MD 解析（前端轻量版，与后端逻辑对应）────────────────────────────
function parseMd(text) {
  const blocks = [];
  const lines  = text.split('\n');
  let inCode = false, codeLines = [];
  let skipCover = true;

  for (const line of lines) {
    // 代码块
    if (line.trim().startsWith('```')) {
      if (!inCode) { inCode = true; codeLines = []; }
      else { inCode = false; if (codeLines.length) blocks.push({type:'code', lines:[...codeLines]}); }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }

    const s = line.trim();

    // 跳过封面：遇到数字开头的标题才开始
    if (skipCover) {
      const m = line.match(/^(#{1,3})\s+(.*)/);
      if (m) {
        const titleText = m[2].trim();
        if (/^\d+[\.\s]/.test(titleText)) {
          skipCover = false;
          // 继续往下解析这一行
        } else {
          continue;
        }
      } else {
        continue;
      }
    }

    if (s === '---') continue;

    // 标题映射：# → h1，## → h2，### 及以上 → h3
    const h3p = line.match(/^#{3,}\s+(.*)/);
    const h2  = line.match(/^##\s+(.*)/);
    const h1  = line.match(/^#\s+(.*)/);

    if (h3p)     blocks.push({type:'h3', text: h3p[1].trim()});
    else if (h2) blocks.push({type:'h2', text: h2[1].trim()});
    else if (h1) blocks.push({type:'h1', text: h1[1].trim()});
    else if (s === '') blocks.push({type:'blank'});
    else {
      let t = line.replace(/^　+/, '').trim();
      t = t.replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*(.+?)\*/g, '$1').replace(/`(.+?)`/g, '$1');
      if (t) blocks.push({type:'body', text: t});
    }
  }
  return blocks;
}

// ── 渲染预览 ─────────────────────────────────────────────────────────
function renderPreview() {
  const fmt    = getFmt();
  const mdText = document.getElementById('md-input').value;
  const inner  = document.getElementById('a4-inner');

  // 预览缩放比（370px / 794px ≈ 0.466）
  const SCALE = 370 / 794;

  // 页边距按缩放比换算
  const pl = cm2px(fmt.margin_left)  * SCALE;
  const pr = cm2px(fmt.margin_right) * SCALE;
  const pt = cm2px(fmt.margin_top)   * SCALE;
  const pb = cm2px(fmt.margin_bottom)* SCALE;
  inner.style.padding = `${pt}px ${pr}px ${pb}px ${pl}px`;

  // 封面信息
  const coverType = document.getElementById('cover-type').value;
  const school  = fmt.school;
  const course  = document.getElementById('course').value  || '大数据分析与可视化项目实战';
  const topic   = document.getElementById('topic').value   || '（题目）';
  const major   = document.getElementById('major').value   || '（专业班级）';
  const teacher = document.getElementById('teacher').value || '（指导教师）';

  let coverHtml = `<div class="pv-cover">
    <span class="pv-cover-school">${esc(school)}</span>
    <span class="pv-cover-title">课 程 设 计</span>`;

  if (coverType === 'personal') {
    const name = document.getElementById('name').value || '（姓名）';
    const sid  = document.getElementById('sid').value  || '（学号）';
    coverHtml += `
    <span class="pv-cover-info">课程名称：${esc(course)}</span>
    <span class="pv-cover-info">题&nbsp;&nbsp;&nbsp;&nbsp;目：${esc(topic)}</span>
    <span class="pv-cover-info">学生姓名：${esc(name)}</span>
    <span class="pv-cover-info">学&nbsp;&nbsp;&nbsp;&nbsp;号：${esc(sid)}</span>
    <span class="pv-cover-info">专业班级：${esc(major)}</span>
    <span class="pv-cover-info">指导教师：${esc(teacher)}</span>`;
  } else {
    const names = [...document.querySelectorAll('.m-name')].map(i=>i.value||'（姓名）');
    const sids  = [...document.querySelectorAll('.m-sid')].map(i=>i.value||'（学号）');
    coverHtml += `
    <span class="pv-cover-info">课程名称：${esc(course)}</span>
    <span class="pv-cover-info">题&nbsp;&nbsp;&nbsp;&nbsp;目：${esc(topic)}</span>`;
    names.forEach((n,i) => { coverHtml += `<span class="pv-cover-info">姓名学号：${esc(n)}&nbsp;&nbsp;${esc(sids[i])}</span>`; });
    coverHtml += `
    <span class="pv-cover-info">专业班级：${esc(major)}</span>
    <span class="pv-cover-info">指导教师：${esc(teacher)}</span>`;
  }
  coverHtml += `<span class="pv-cover-date">202&nbsp;&nbsp;&nbsp;年&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;月&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;日</span></div>
  <hr class="pv-cover-divider" />`;

  // 正文 blocks → HTML
  const blocks = parseMd(mdText);
  const lh     = fmt.line_spacing;
  const bodyPx = fmt.body_size * 1.333 * SCALE;
  const indentPx = bodyPx * 2;

  let bodyHtml = '';
  for (const b of blocks) {
    if (b.type === 'blank') continue;
    if (b.type === 'h1') {
      const sz = fmt.h1_size * 1.333 * SCALE;
      bodyHtml += `<p style="font-family:${cnFont(fmt.h1_font)},'Times New Roman';font-size:${sz}px;font-weight:${fmt.h1_bold?'bold':'normal'};line-height:${lh};margin:${sz*0.75}px 0 ${sz*0.375}px;">${esc(b.text)}</p>`;
    } else if (b.type === 'h2') {
      const sz = fmt.h2_size * 1.333 * SCALE;
      bodyHtml += `<p style="font-family:${cnFont(fmt.h2_font)},'Times New Roman';font-size:${sz}px;font-weight:${fmt.h2_bold?'bold':'normal'};line-height:${lh};margin:${sz*0.375}px 0 ${sz*0.188}px;">${esc(b.text)}</p>`;
    } else if (b.type === 'h3') {
      const sz = fmt.h3_size * 1.333 * SCALE;
      bodyHtml += `<p style="font-family:${cnFont(fmt.h3_font)},'Times New Roman';font-size:${sz}px;font-weight:${fmt.h3_bold?'bold':'normal'};line-height:${lh};margin:${sz*0.286}px 0 ${sz*0.143}px;">${esc(b.text)}</p>`;
    } else if (b.type === 'body') {
      bodyHtml += `<p style="font-family:${cnFont(fmt.body_font)},'Times New Roman';font-size:${bodyPx}px;line-height:${lh};text-indent:${indentPx}px;text-align:justify;margin:0;">${esc(b.text)}</p>`;
    } else if (b.type === 'code') {
      const codeContent = b.lines.map(l => esc(l)).join('\n');
      bodyHtml += `<pre class="pv-code-block" style="font-size:${9*SCALE}px">${codeContent}</pre>`;
    }
  }

  inner.innerHTML = coverHtml + bodyHtml;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 防抖，300ms 后渲染
let _timer = null;
function schedulePreview() {
  clearTimeout(_timer);
  _timer = setTimeout(renderPreview, 300);
}

// ── 表单交互 ─────────────────────────────────────────────────────────
function onTypeChange() {
  const t = document.getElementById('cover-type').value;
  document.getElementById('personal-section').style.display = t==='personal' ? '' : 'none';
  document.getElementById('members-section').style.display  = t==='group'    ? '' : 'none';
  schedulePreview();
}

function addMember() {
  const list = document.getElementById('members-list');
  const row  = document.createElement('div');
  row.className = 'member-row';
  row.innerHTML = `<input type="text" placeholder="姓名" class="m-name" oninput="schedulePreview()" />
    <input type="text" placeholder="学号" class="m-sid" oninput="schedulePreview()" />
    <button class="btn-remove" onclick="removeMember(this)">×</button>`;
  list.appendChild(row);
}

function removeMember(btn) {
  if (document.querySelectorAll('.member-row').length > 1) { btn.parentElement.remove(); schedulePreview(); }
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = type || '';
}

// ── 生成下载 ─────────────────────────────────────────────────────────
async function generate() {
  const mdText = document.getElementById('md-input').value.trim();
  if (!mdText) { setStatus('请先粘贴 Markdown 内容', 'error'); return; }

  const fmt        = getFmt();
  const coverType  = document.getElementById('cover-type').value;
  const payload    = {
    cover_type: coverType,
    md_text:    mdText,
    course:  document.getElementById('course').value,
    topic:   document.getElementById('topic').value,
    major:   document.getElementById('major').value,
    teacher: document.getElementById('teacher').value,
    fmt,
  };

  if (coverType === 'personal') {
    payload.name = document.getElementById('name').value;
    payload.sid  = document.getElementById('sid').value;
  } else {
    const names = document.querySelectorAll('.m-name');
    const sids  = document.querySelectorAll('.m-sid');
    payload.members = Array.from(names).map((n,i) => ({name:n.value, sid:sids[i].value}));
  }

  const btn = document.getElementById('btn-gen');
  btn.disabled = true; setStatus('生成中...');

  try {
    const res = await fetch('/convert', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    if (!res.ok) { const e = await res.json(); setStatus(e.error||'生成失败','error'); return; }
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `课程设计报告-${coverType==='personal'?(payload.name||'报告'):'小组'}.docx`;
    a.click(); URL.revokeObjectURL(url);
    setStatus('✓ 下载成功', 'success');
  } catch(e) { setStatus('网络错误，请重试','error'); }
  finally { btn.disabled = false; }
}
</script>
